<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tortas - Sweetland By Anny</title>
    <!-- RUTAS CORREGIDAS -->
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

  <header id="Tortas">
    <!-- LOGO CORREGIDO -->
    <img src="assets/logo-principal.png" alt="Logo" class="logo"/>
    
    <nav id="menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="aboutus.html">Sobre nosotros</a></li>
        <li id="submenu">
          <a href="#">Nuestros productos</a>
          <ul class="dropdown">
            <li><a href="tortas.html">Tortas</a></li>
            <li><a href="postres.html">Postres</a></li>
            <li><a href="detalles.html">Detalles</a></li>
          </ul>
        </li>
        <li><a href="contactenos.html">Contáctenos</a></li>
        <li><a href="mi-cuenta.html">👤 Mi cuenta</a></li>
      </ul>
    </nav>
  </header>

  <section id="page-header">
    <h1>Nuestras Tortas Artesanales</h1>
  </section>

  <!-- Loader -->
  <div id="loader" class="loader-container">
    <img src="assets/cupcake-rosa.png" class="loader-cupcake" alt="Cargando...">
    <p class="loader-text">Buscando las mejores recetas...</p>
  </div>

  <!-- Galería de productos -->
  <div id="galeria-productos" class="galeria-productos"></div>

  <!-- Carrito flotante -->
  <a href="carrito.html" class="cart-link" id="cart-button">🛒 (<span id="cart-count">0</span>)</a>

  <!-- Notificación -->
  <div id="cart-notification" class="notification hidden">
    <div class="notification-content">
      <img src="assets/cupcake-rosa.png" alt="Cupcake" class="cupcake-img">
      <p>¡Se añadió al carrito!</p>
      <button onclick="closeNotification()">Cerrar</button>
    </div>
  </div>

  <!-- SCRIPTS AL FINAL -->
  <script src="js/carrito.js"></script>
  <script src="js/script.js"></script>
  <script>
    // Llamamos a la función con la categoría específica para esta página
    window.addEventListener('load', () => cargarProductos('tortas'));
  </script>

</body>
</html>
