<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi cuenta - Sweetland By Anny</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: #55b7e5; min-height: 100vh; }
    header { background: linear-gradient(160deg, #f7d5d8 60%, #eabfc8 100%); display: flex; justify-content: center; align-items: center; padding: 30px 20px 40px; }
    .logo { width: 140px; border-radius: 50%; box-shadow: 0 10px 30px rgba(121,30,124,0.25); }
    .container { max-width: 520px; margin: 40px auto; padding: 0 20px 60px; }
    h1 { font-family: 'Playfair Display', serif; color: #fff; text-align: center; font-size: 2em; margin-bottom: 30px; text-shadow: 0 2px 10px rgba(121,30,124,0.3); }
    .card { background: white; border-radius: 24px; padding: 36px 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .tabs { display: flex; gap: 0; margin-bottom: 28px; border-radius: 12px; overflow: hidden; border: 2px solid #f7d5d8; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: white; font-family: 'Nunito', sans-serif; font-size: 0.95em; font-weight: 700; cursor: pointer; color: #aaa; transition: all 0.2s; }
    .tab-btn.active { background: linear-gradient(135deg, #aa1d80, #791e7c); color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.9em; font-weight: 700; color: #791e7c; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 2px solid #f7d5d8; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 0.95em; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #aa1d80; }
    .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #aa1d80, #791e7c); color: white; border: none; border-radius: 50px; font-family: 'Nunito', sans-serif; font-size: 1em; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(170,29,128,0.35); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .msg { padding: 12px 16px; border-radius: 12px; font-size: 0.9em; font-weight: 600; margin-bottom: 16px; display: none; }
    .msg.error { background: #fdecea; color: #c0392b; display: block; }
    .msg.success { background: #eafaf1; color: #1e8449; display: block; }
    #seccion-mis-pedidos { display: none; }
    .pedido-card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .pedido-id { font-family: 'Playfair Display', serif; font-size: 1.1em; color: #791e7c; }
    .pedido-estado { padding: 4px 14px; border-radius: 50px; font-size: 0.8em; font-weight: 700; text-transform: uppercase; }
    .estado-pendiente { background: #fff3cd; color: #856404; }
    .estado-confirmado { background: #d1ecf1; color: #0c5460; }
    .estado-en_preparacion { background: #cce5ff; color: #004085; }
    .estado-completado { background: #d4edda; color: #155724; }
    .estado-cancelado { background: #f8d7da; color: #721c24; }
    .pedido-detalle { font-size: 0.9em; color: #666; border-top: 1px solid #f7d5d8; padding-top: 12px; margin-top: 4px; }
    .pedido-item { display: flex; justify-content: space-between; padding: 4px 0; }
    .pedido-total { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 2px solid #f7d5d8; font-weight: 700; color: #aa1d80; font-size: 1em; }
    .volver { display: block; text-align: center; color: white; font-weight: 600; text-decoration: none; margin-top: 20px; opacity: 0.85; }
    .usuario-info { text-align: center; margin-bottom: 20px; color: white; }
    .btn-logout { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.5); color: white; padding: 8px 20px; border-radius: 50px; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9em; margin-top: 10px; transition: all 0.2s; }
  </style>
</head>
<body>

<header>
  <img src="assets/logo-principal.png" alt="Logo Sweetland" class="logo"/>
</header>

<div class="container text-center" id="global-loader" style="display:none; padding-top: 100px;">
    <div class="spinner-border text-white" role="status"></div>
    <p class="text-white mt-3 fw-bold">Sincronizando sesión...</p>
</div>

<div class="container" id="main-container">
  <!-- SECCIÓN LOGIN/REGISTRO -->
  <div id="seccion-auth" style="display:none;">
    <h1>Mi cuenta</h1>
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn" onclick="switchTab('registro')">Registrarme</button>
      </div>

      <!-- LOGIN -->
      <div id="tab-login" class="tab-content active">
        <div id="msg-login" class="msg"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="tucorreo@email.com"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>
        <button class="btn-submit" id="btn-login" onclick="doLogin()">
          <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>

        <!-- LINK RECUPERACIÓN DE CONTRASEÑA 🔑 -->
        <p style="text-align: center; margin-top: 15px;">
            <a href="#" onclick="pedirCorreoRecuperacion()" style="color: #791e7c; font-size: 0.85em; text-decoration: none; font-weight: 600;">¿Olvidaste tu contraseña?</a>
        </p>

        <!-- SECCIÓN DE AUTENTICACIÓN EXTERNA (OAUTH) 🛡️ -->
        <div style="text-align: center; margin: 25px 0 15px; position: relative;">
          <hr style="border: 0; border-top: 1px solid #f7d5d8;">
          <span style="background: white; padding: 0 15px; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); color: #aaa; font-size: 0.85em; font-weight: 700;">O TAMBIÉN</span>
        </div>

        <a href="https://sweetland-by-anny-production.up.railway.app/auth/login/google" 
           style="display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 12px; border: 2px solid #f7d5d8; border-radius: 50px; background: white; color: #555; text-decoration: none; font-family: 'Nunito', sans-serif; font-size: 0.95em; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);"
           onmouseover="this.style.borderColor='#aa1d80';" onmouseout="this.style.borderColor='#f7d5d8';">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="G">
          Continuar con Google
        </a>
      </div>

      <!-- REGISTRO -->
      <div id="tab-registro" class="tab-content">
        <div id="msg-registro" class="msg"></div>
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="reg-nombre" placeholder="Tu nombre"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="tucorreo@email.com"/>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres"/>
        </div>
        <div class="form-group">
          <label>Teléfono <span style="color:#aaa;font-weight:400">(opcional)</span></label>
          <input type="tel" id="reg-telefono" placeholder="3XX XXX XXXX"/>
        </div>
        <button class="btn-submit" id="btn-registro" onclick="doRegistro()">
          <i class="fa-solid fa-user-plus"></i> Crear cuenta
        </button>
      </div>
    </div>
  </div>

  <!-- SECCIÓN MIS PEDIDOS -->
  <div id="seccion-mis-pedidos" style="display:none;">
    <div class="usuario-info">
      <strong id="saludo-usuario" style="font-family: 'Playfair Display', serif; font-size: 1.3em;"></strong><br>
      <button class="btn-logout" onclick="doLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
      </button>
    </div>

    <h1>Mis pedidos</h1>
    <div id="lista-pedidos">
      <div class="card" style="text-align:center;color:#aaa;">Cargando pedidos...</div>
    </div>
  </div>

  <a href="index.html" class="volver">← Volver al inicio</a>
</div>

<script>
  const API = 'https://sweetland-by-anny-production.up.railway.app';

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'registro'));
    });
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-registro').classList.toggle('active', tab === 'registro');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type}`;
    el.style.display = 'block';
  }

  function guardarSesion(usuario) {
    localStorage.setItem('cliente_sweetland', JSON.stringify(usuario));
  }

  function obtenerSesion() {
    const data = localStorage.getItem('cliente_sweetland');
    return data ? JSON.parse(data) : null;
  }

  function eliminarSesion() {
    localStorage.removeItem('cliente_sweetland');
  }

  // --- 💡 NUEVA FUNCIÓN: Sincronizar con Cookie del Servidor ---
  async function sincronizarSesion() {
    try {
      const res = await fetch(`${API}/auth/me`, { credentials: 'include' });
      const data = await res.json();
      if (res.ok && data.usuario) {
        guardarSesion(data.usuario);
        return data.usuario;
      }
    } catch (e) { console.error("Error sincronización:", e); }
    return null;
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('btn-login');

    if (!email || !password) {
      showMsg('msg-login', 'Por favor completa todos los campos.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Verificando...';

    try {
      const res = await fetch(`${API}/pedidos/public/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        guardarSesion(data.usuario);
        mostrarMisPedidos();
      } else {
        showMsg('msg-login', data.error || 'Credenciales incorrectas.', 'error');
      }
    } catch {
      showMsg('msg-login', 'Error de conexión.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
    }
  }

  async function doRegistro() {
    const nombre = document.getElementById('reg-nombre').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const telefono = document.getElementById('reg-telefono').value.trim();
    const btn = document.getElementById('btn-registro');

    if (!nombre || !email || !password) {
      showMsg('msg-registro', 'Nombre, email y contraseña son obligatorios.', 'error');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Creando cuenta...';

    try {
      const res = await fetch(`${API}/pedidos/public/registro`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ nombre, email, password, telefono, direccion: '' })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('msg-registro', '¡Cuenta creada! Ya puedes iniciar sesión.', 'success');
        setTimeout(() => switchTab('login'), 2000);
      } else {
        showMsg('msg-registro', data.error || 'Error al registrarse.', 'error');
      }
    } catch {
      showMsg('msg-registro', 'Error de conexión.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Crear cuenta';
    }
  }

  // --- FUNCIÓN PARA SOLICITAR RECUPERACIÓN DE CONTRASEÑA ---
  async function pedirCorreoRecuperacion() {
    const email = prompt("Por favor, ingresa tu correo electrónico registrado:");
    
    // Si el usuario cancela o deja vacío, no hacemos nada
    if (!email || email.trim() === "") return;

    try {
      const res = await fetch(`${API}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.trim() })
      });
      
      const data = await res.json();
      
      // 🛡️ Seguridad: Siempre mostramos el mismo mensaje para evitar User Enumeration
      alert(data.mensaje || "Si el correo está registrado, recibirás un enlace de recuperación pronto.");
      
    } catch (error) {
      console.error("Error en recuperación:", error);
      alert("Hubo un problema al conectar con el servidor. Intenta más tarde.");
    }
  }

  async function doLogout() {
    try { await fetch(`${API}/auth/logout`, { method: 'POST', credentials: 'include' }); } catch (e) {}
    eliminarSesion();
    document.getElementById('seccion-mis-pedidos').style.display = 'none';
    document.getElementById('seccion-auth').style.display = 'block';
  }

  async function mostrarMisPedidos() {
    const cliente = obtenerSesion();
    if (!cliente) {
        document.getElementById('seccion-mis-pedidos').style.display = 'none';
        document.getElementById('seccion-auth').style.display = 'block';
        return;
    }

    document.getElementById('seccion-auth').style.display = 'none';
    document.getElementById('seccion-mis-pedidos').style.display = 'block';
    document.getElementById('saludo-usuario').textContent = `¡Hola, ${cliente.nombre}!`;

    try {
      const timestamp = new Date().getTime();
      const res = await fetch(`${API}/pedidos/public/mis-pedidos?t=${timestamp}`, { credentials: 'include' });
      const data = await res.json();
      const lista = document.getElementById('lista-pedidos');

      if (!res.ok) {
        lista.innerHTML = `<div class="card" style="color:#c0392b;">Sesión expirada.</div>`;
        return;
      }

      if (!data.pedidos || data.pedidos.length === 0) {
        lista.innerHTML = `<div class="card" style="text-align:center;color:#aaa; padding: 40px;">
          <i class="fa-solid fa-box-open" style="font-size: 3em; margin-bottom: 10px;"></i><br>
          No tienes pedidos registrados.
        </div>`;
        return;
      }

      lista.innerHTML = data.pedidos.map(p => `
        <div class="pedido-card">
          <div class="pedido-header">
            <span class="pedido-id">Pedido #${p.id_pedido}</span>
            <span class="pedido-estado estado-${p.estado.toLowerCase()}">${p.estado.replace(/_/g, ' ')}</span>
          </div>
          <div style="font-size:0.85em;color:#aaa;margin-bottom:8px;">📅 ${p.fecha_pedido || ''}</div>
          <div class="pedido-detalle">
            ${p.detalles ? p.detalles.map(d => `
              <div class="pedido-item">
                <span>${d.cantidad}x ${d.nombre}</span>
                <span>$${parseFloat(d.subtotal).toLocaleString('es-CO')}</span>
              </div>
            `).join('') : ''}
            <div class="pedido-total">
              <span>Total</span>
              <span>$${parseFloat(p.total).toLocaleString('es-CO')}</span>
            </div>
          </div>
        </div>
      `).join('');

    } catch (error) {
      document.getElementById('lista-pedidos').innerHTML = `<div class="card" style="color:#c0392b;">Error de conexión.</div>`;
    }
  }

  // --- ONLOAD LOGIC ---
  window.addEventListener('load', async () => {
    const loader = document.getElementById('global-loader');
    const main = document.getElementById('main-container');

    // 1. ¿Ya hay sesión local?
    if (obtenerSesion()) {
      mostrarMisPedidos();
    } 
    // 2. ¿Hay sesión en el servidor (ej: tras redirect de Google)?
    else {
      loader.style.display = 'block';
      main.style.opacity = '0.3';
      const user = await sincronizarSesion();
      loader.style.display = 'none';
      main.style.opacity = '1';
      
      if (user) {
        mostrarMisPedidos();
      } else {
        document.getElementById('seccion-auth').style.display = 'block';
      }
    }
  });

  // ENTER KEY
  document.getElementById('login-email').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-password').addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
