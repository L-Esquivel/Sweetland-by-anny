<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nueva Contraseña - Sweetland By Anny</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Estilos idénticos a mi-cuenta.html para coherencia */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', sans-serif; background: #55b7e5; min-height: 100vh; }
    header { background: linear-gradient(160deg, #f7d5d8 60%, #eabfc8 100%); display: flex; justify-content: center; align-items: center; padding: 30px 20px 40px; }
    .logo { width: 140px; border-radius: 50%; box-shadow: 0 10px 30px rgba(121,30,124,0.25); }
    .container { max-width: 520px; margin: 40px auto; padding: 0 20px 60px; }
    h1 { font-family: 'Playfair Display', serif; color: #fff; text-align: center; font-size: 2em; margin-bottom: 30px; }
    .card { background: white; border-radius: 24px; padding: 36px 32px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.9em; font-weight: 700; color: #791e7c; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 2px solid #f7d5d8; border-radius: 12px; font-family: 'Nunito', sans-serif; outline: none; }
    input:focus { border-color: #aa1d80; }
    .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #aa1d80, #791e7c); color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(170,29,128,0.35); }
    .msg { padding: 12px 16px; border-radius: 12px; font-size: 0.9em; font-weight: 600; margin-bottom: 16px; display: none; }
    .msg.error { background: #fdecea; color: #c0392b; display: block; }
    .msg.success { background: #eafaf1; color: #1e8449; display: block; }
    .volver { display: block; text-align: center; color: white; text-decoration: none; margin-top: 20px; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <img src="assets/logo-principal.png" alt="Logo Sweetland" class="logo"/>
</header>

<div class="container">
  <h1>Nueva contraseña</h1>
  <div class="card">
    <div id="msg-reset" class="msg"></div>
    
    <div id="form-container">
      <p style="color: #666; margin-bottom: 20px; font-size: 0.95em;">Por favor ingresa tu nueva contraseña segura para recuperar el acceso.</p>
      
      <div class="form-group">
        <label>Nueva Contraseña</label>
        <input type="password" id="new-password" placeholder="Mínimo 6 caracteres"/>
      </div>
      
      <div class="form-group">
        <label>Confirmar Contraseña</label>
        <input type="password" id="confirm-password" placeholder="Repite tu contraseña"/>
      </div>
      
      <button class="btn-submit" id="btn-reset" onclick="handleReset()">
        Actualizar contraseña
      </button>
    </div>
  </div>
  <a href="mi-cuenta.html" class="volver">← Volver al inicio de sesión</a>
</div>

<script>
  const API = 'https://sweetland-by-anny-production.up.railway.app';

  // 1. Extraer el TOKEN criptográfico que Google/Backend envió en la URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  function showMsg(text, type) {
    const el = document.getElementById('msg-reset');
    el.textContent = text;
    el.className = `msg ${type}`;
    el.style.display = 'block';
  }

  async function handleReset() {
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const btn = document.getElementById('btn-reset');

    // Validaciones de seguridad en el cliente
    if (!token) {
      showMsg('Token inválido o ausente. Por favor solicita un nuevo correo.', 'error');
      return;
    }

    if (password.length < 6) {
      showMsg('La contraseña debe tener al menos 6 caracteres.', 'error');
      return;
    }

    if (password !== confirm) {
      showMsg('Las contraseñas no coinciden.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Procesando...';

    try {
      const res = await fetch(`${API}/auth/reset-password-confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('¡Contraseña actualizada con éxito! Redirigiendo...', 'success');
        document.getElementById('form-container').style.display = 'none';
        // Redirigir al login tras 3 segundos para que el usuario lea el éxito
        setTimeout(() => window.location.href = 'mi-cuenta.html', 3000);
      } else {
        showMsg(data.error || 'El enlace ha expirado o es inválido.', 'error');
      }
    } catch {
      showMsg('Error de conexión con el servidor. Intenta más tarde.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Actualizar contraseña';
    }
  }
</script>
</body>
</html>
